<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1F1E1C">
  <title>Page | Smart Cut Services</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"
      }
    }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      min-width: 0;
    }

    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: clip;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background:
        radial-gradient(circle at top right, rgba(198, 167, 94, 0.12), transparent 28%),
        linear-gradient(180deg, #f9f7f4 0%, #f4eee2 100%);
      color: #1F1E1C;
      overflow-x: clip;
    }

    #custom-page-root {
      width: 100%;
      padding-top: calc(var(--announce-height, 44px) + var(--header-height, 90px) + 1rem);
    }

    @media (max-width: 1024px) {
      #custom-page-root {
        padding-top: calc(var(--announce-height, 44px) + var(--header-height-mobile, 70px) + 1rem);
      }
    }
  </style>
</head>
<body>
  <div id="sierra-header-root"></div>
  <main id="custom-page-root"></main>
  <div id="sierra-footer-root"></div>

  <script type="module">
    import './firebase-init.js';

    const mount = async (rootId, loader, options = {}) => {
      const root = document.getElementById(rootId);
      if (!root) return;
      try {
        const mod = await loader();
        new mod.default(rootId, options);
      } catch (error) {
        console.error(`❌ Erreur composant ${rootId}:`, error);
      }
    };

    mount('sierra-header-root', () => import('./header.js'));
    mount('custom-page-root', () => import('./custom-page.js'), {
      collectionName: 'footerPages'
    });
    mount('sierra-footer-root', () => import('./footer.js'), {
      imageBasePath: './',
      showSocial: true,
      showContact: true,
      showInfos: true,
      showPayments: true,
      showCopyright: true
    });
  </script>
</body>
</html>
