<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1F1E1C">
  <title>Impression Photo | Smart Cut Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; min-width: 0; }
    html, body { width: 100%; max-width: 100%; overflow-x: clip; }
    body { font-family: 'Manrope', sans-serif; color: #1f1e1c; background: radial-gradient(circle at top right, rgba(198,167,94,.14), transparent 26%), linear-gradient(180deg, #fbf7ef 0%, #f2ebde 100%); overflow-x: clip; }
    #printing-photo-root { width: 100%; padding-top: calc(var(--announce-height, 44px) + var(--header-height, 90px) + 1.25rem); }
    @media (max-width: 1024px) { #printing-photo-root { padding-top: calc(var(--announce-height, 44px) + var(--header-height-mobile, 70px) + 1rem); } }
  </style>
</head>
<body>
  <div id="sierra-header-root"></div>
  <main id="printing-photo-root"></main>
  <div id="sierra-footer-root"></div>
  <script type="module">
    import './firebase-init.js';
    const mount = async (rootId, loader, options = {}) => {
      const root = document.getElementById(rootId);
      if (!root) return;
      try {
        const mod = await loader();
        if (typeof mod.getCartManager === 'function') {
          mod.getCartManager(options);
          return;
        }
        new mod.default(rootId, options);
      } catch (error) {
        console.error(`Erreur composant ${rootId}:`, error);
      }
    };
    mount('sierra-header-root', () => import('./header.js?v=20260529-3'));
    mount('printing-photo-root', () => import('./printing-photo.js?v=20260604-1'));
    mount('sierra-footer-root', () => import('./footer.js'), {
      imageBasePath: './',
      showSocial: true,
      showContact: true,
      showInfos: true,
      showPayments: true,
      showCopyright: true
    });
  </script>
</body>
</html>
