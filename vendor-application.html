<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="icon" href="/ico/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/ico/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/ico/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/ico/apple-touch-icon.png">
  <link rel="manifest" href="/ico/site.webmanifest">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1F1E1C">
  <title>Devenir vendeur | Smart Cut Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; min-width: 0; }
    html, body { width: 100%; max-width: 100%; overflow-x: clip; }
    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(198, 167, 94, 0.12), transparent 28%),
        linear-gradient(180deg, #f8f4ec 0%, #f2ebdf 100%);
      color: #1F1E1C;
      overflow-x: clip;
    }
    #vendor-application-root {
      width: 100%;
      padding-top: calc(var(--announce-height, 44px) + var(--header-height, 90px) + 1.5rem);
      padding-bottom: 4rem;
    }
    @media (max-width: 1024px) {
      #vendor-application-root {
        padding-top: calc(var(--announce-height, 44px) + var(--header-height-mobile, 70px) + 1rem);
      }
    }
  </style>
</head>
<body>
  <div id="sierra-header-root"></div>
  <main id="vendor-application-root"></main>
  <div id="sierra-footer-root"></div>

  <script type="module">
    import './firebase-init.js';

    const mount = async (rootId, loader, options = {}) => {
      const root = document.getElementById(rootId);
      if (!root) return;
      try {
        const mod = await loader();
        new mod.default(rootId, options);
      } catch (error) {
        console.error(`Erreur composant ${rootId}:`, error);
      }
    };

    mount('sierra-header-root', () => import('./header.js'));
    mount('vendor-application-root', () => import('./vendor-application.js'));
    mount('sierra-footer-root', () => import('./footer.js'), {
      imageBasePath: './',
      showSocial: true,
      showContact: true,
      showInfos: true,
      showPayments: true,
      showCopyright: true
    });
  </script>
</body>
</html>
