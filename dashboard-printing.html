<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Cut Services · Dashboard Impression</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --bg: #f7f1e7;
      --surface: rgba(255, 255, 255, 0.94);
      --surface-soft: rgba(255, 255, 255, 0.72);
      --text: #1d1b18;
      --muted: #6d6559;
      --accent: #c6a75e;
      --border: rgba(29, 27, 24, 0.08);
      --shadow: 0 24px 60px rgba(31, 30, 28, 0.08);
      --success: #0f9f6e;
      --warning: #d97706;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Manrope', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(198, 167, 94, 0.18), transparent 22%),
        linear-gradient(180deg, #fcf7ee 0%, #f2eadf 100%);
    }

    .shell {
      min-height: 100vh;
      padding: 2rem;
      display: grid;
      gap: 1.25rem;
    }

    .hero,
    .panel,
    .stat-card {
      border: 1px solid var(--border);
      border-radius: 30px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero,
    .panel {
      padding: 1.5rem;
    }

    .hero {
      background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(248,242,230,0.94));
    }

    .hero small,
    .panel small {
      display: inline-block;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
    }

    .hero h1,
    .panel h2 {
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4.25rem);
      line-height: 0.92;
    }

    .hero p,
    .panel p {
      color: var(--muted);
      line-height: 1.8;
    }

    .hero p {
      max-width: 74ch;
      margin: 1rem 0 0;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
    }

    .stat-card {
      padding: 1.1rem 1.15rem;
    }

    .stat-card strong {
      display: block;
      font-size: 1.65rem;
      line-height: 1;
    }

    .stat-card span {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .config-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1.25rem;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      border-radius: 999px;
      padding: 0.45rem 0.8rem;
      font-size: 0.82rem;
      font-weight: 700;
      background: rgba(15, 159, 110, 0.12);
      color: var(--success);
    }

    .status-chip.off {
      background: rgba(217, 119, 6, 0.12);
      color: var(--warning);
    }

    .stack {
      display: grid;
      gap: 1rem;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.9rem;
    }

    .field,
    .option-list {
      display: grid;
      gap: 0.45rem;
    }

    .field span,
    .option-title {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 600;
    }

    .input,
    .textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.85rem 0.95rem;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    .textarea {
      min-height: 104px;
      resize: vertical;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.72);
      border-radius: 999px;
      padding: 0.75rem 1rem;
      width: fit-content;
      font-weight: 700;
    }

    .option-list {
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 1rem;
      background: linear-gradient(180deg, rgba(198,167,94,0.08), rgba(255,255,255,0.92));
    }

    .option-row {
      display: grid;
      grid-template-columns: 1.2fr 120px auto auto;
      gap: 0.7rem;
      align-items: center;
      margin-top: 0.7rem;
    }

    .mini-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.75rem 0.8rem;
      font: inherit;
      background: #fff;
      color: var(--text);
    }

    .check {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 600;
    }

    .actions {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    button {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 0.78rem 1rem;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--text);
      color: #fff;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.82);
      border-color: var(--border);
      color: var(--text);
    }

    .btn-danger {
      background: rgba(185, 28, 28, 0.1);
      border-color: rgba(185, 28, 28, 0.16);
      color: #991b1b;
    }

    .hint {
      font-size: 0.82rem;
      color: var(--muted);
    }

    @media (max-width: 1100px) {
      .shell { padding: 1rem; }
      .config-grid,
      .field-grid,
      .option-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell" id="printing-dashboard-root"></main>
  <script type="module" src="./dashboard-printing.js"></script>
  <script type="module" src="./admin-access.js"></script>
</body>
</html>
