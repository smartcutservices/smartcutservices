<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="icon" href="/ico/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/ico/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/ico/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/ico/apple-touch-icon.png">
  <link rel="manifest" href="/ico/site.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Smart Cut">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="msapplication-TileColor" content="#1F1E1C">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1F1E1C">
  <title>Marketplace Vendeurs | Smart Cut Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; min-width: 0; }
    html, body { width: 100%; max-width: 100%; overflow-x: clip; }
    body {
      font-family: 'Manrope', sans-serif;
      color: #1f1e1c;
      background:
        radial-gradient(circle at top left, rgba(198, 167, 94, 0.16), transparent 24%),
        linear-gradient(180deg, #fbf7ef 0%, #f2ebde 100%);
      overflow-x: clip;
    }
    #vendor-marketplace-root {
      width: 100%;
      padding-top: calc(var(--announce-height, 44px) + var(--header-height, 90px) + 1.25rem);
    }
    @media (max-width: 1024px) {
      #vendor-marketplace-root {
        padding-top: calc(var(--announce-height, 44px) + var(--header-height-mobile, 70px) + 1rem);
      }
    }
  </style>
</head>
<body>
  <div id="sierra-header-root"></div>
  <main id="vendor-marketplace-root"></main>
  <div id="sierra-footer-root"></div>
  <script type="module">
    import './firebase-init.js';
    const mount = async (rootId, loader, options = {}) => {
      const root = document.getElementById(rootId);
      if (!root) return;
      try {
        const mod = await loader();
        new mod.default(rootId, options);
      } catch (error) {
        console.error(`Erreur composant ${rootId}:`, error);
      }
    };
    mount('sierra-header-root', () => import('./header.js'));
    mount('vendor-marketplace-root', () => import('./vendor-marketplace.js'));
    mount('sierra-footer-root', () => import('./footer.js'), {
      imageBasePath: './',
      showSocial: true,
      showContact: true,
      showInfos: true,
      showPayments: true,
      showCopyright: true
    });
  </script>
<script src="/pwa-install.js" defer></script>
</body>
</html>
