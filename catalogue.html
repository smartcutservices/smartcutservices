<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1F1E1C">
  <title>Catalogue | Smart Cut Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2C2A29',
            secondary: '#C6A75E',
            accent: '#7A746B',
            luxury: '#1F1E1C',
            ivory: '#F5F1E8'
          },
          fontFamily: {
            serif: ['Cormorant Garamond', 'serif'],
            sans: ['Manrope', 'sans-serif']
          }
        }
      }
    };
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; min-width: 0; }
    html, body { width: 100%; max-width: 100%; overflow-x: clip; }
    body {
      font-family: 'Manrope', sans-serif;
      color: #1f1e1c;
      background:
        radial-gradient(circle at top left, rgba(198, 167, 94, 0.14), transparent 24%),
        linear-gradient(180deg, #fbf7ef 0%, #f2ebde 100%);
      overflow-x: clip;
    }
    #catalogue-page-root {
      width: 100%;
      padding-top: calc(var(--announce-height, 44px) + var(--header-height, 90px));
    }
    .catalogue-shell {
      width: 100%;
      padding: 0 0 3rem;
    }
    @media (max-width: 1024px) {
      #catalogue-page-root {
        padding-top: calc(var(--announce-height, 44px) + var(--header-height-mobile, 70px));
      }
    }
  </style>
</head>
<body>
  <div id="sierra-header-root"></div>
  <main id="catalogue-page-root">
    <div class="catalogue-shell">
      <div id="catalogue-section-root"></div>
    </div>
  </main>
  <div id="sierra-footer-root"></div>

  <script type="module">
    const ASSET_VERSION = '20260607-1';
    window.SMART_CUT_ASSET_VERSION = ASSET_VERSION;
    await import(`./firebase-init.js?v=${ASSET_VERSION}`);

    const params = new URLSearchParams(window.location.search);
    const initialCategory = params.get('category') || 'all';
    const initialLineKey = params.get('line') || '';
    const openFiltersOnInit = params.get('filters') === 'open';
    const legacyProductId = params.get('product') || '';

    if (legacyProductId) {
      const redirectUrl = new URL('./product.html', window.location.href);
      redirectUrl.searchParams.set('product', legacyProductId);
      window.location.replace(redirectUrl.toString());
    }

    const mount = async (rootId, loader, options = {}) => {
      const root = document.getElementById(rootId);
      if (!root) return;
      try {
        const mod = await loader();
        new mod.default(rootId, options);
      } catch (error) {
        console.error(`Erreur composant ${rootId}:`, error);
      }
    };

    mount('sierra-header-root', () => import(`./header.js?v=${ASSET_VERSION}`));
    mount('catalogue-section-root', () => import(`./categories-section.js?v=${ASSET_VERSION}`), {
      collectionName: 'products',
      productsPerPage: 12,
      initialCategory,
      initialLineKey,
      openFiltersOnInit,
      imageBasePath: './',
      isInModal: false
    });
    mount('sierra-footer-root', () => import(`./footer.js?v=${ASSET_VERSION}`), {
      imageBasePath: './',
      showSocial: true,
      showContact: true,
      showInfos: true,
      showPayments: true,
      showCopyright: true
    });

  </script>
</body>
</html>
