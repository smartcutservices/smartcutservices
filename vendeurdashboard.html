<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=./DvendorProducts.html">
  <title>Smart Cut Services · Dashboard vendeur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      font-family: 'Manrope', sans-serif;
      background: #F8F9FA;
      color: #1E293B;
    }
    .card {
      max-width: 560px;
      width: 100%;
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 24px;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
    }
    .card h1 {
      margin: 1rem 0 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      line-height: .96;
    }
    .card p {
      color: #64748B;
      line-height: 1.8;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: .55rem;
      padding: .6rem 1rem;
      border-radius: 999px;
      background: rgba(198,167,94,.12);
      color: #C6A75E;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      font-size: .76rem;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: .55rem;
      margin-top: 1rem;
      padding: .85rem 1.1rem;
      border-radius: .6rem;
      background: #0A0A0A;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <section class="card">
    <div class="badge">Dashboard vendeur</div>
    <h1>Redirection en cours</h1>
    <p>Vous allez etre redirige vers le dashboard produits vendeur complet.</p>
    <a href="./DvendorProducts.html">Ouvrir le dashboard vendeur</a>
  </section>
</body>
</html>
