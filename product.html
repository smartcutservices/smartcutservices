<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="icon" href="/ico/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/ico/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/ico/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/ico/apple-touch-icon.png">
  <link rel="manifest" href="/ico/site.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Smart Cut">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="msapplication-TileColor" content="#1F1E1C">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1F1E1C">
  <title>Produit | Smart Cut Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2C2A29',
            secondary: '#C6A75E',
            accent: '#7A746B',
            luxury: '#1F1E1C',
            ivory: '#F5F1E8'
          },
          fontFamily: {
            serif: ['Cormorant Garamond', 'serif'],
            sans: ['Manrope', 'sans-serif']
          }
        }
      }
    };
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; min-width: 0; }
    html, body { width: 100%; max-width: 100%; overflow-x: clip; }
    body {
      font-family: 'Manrope', sans-serif;
      color: #1f1e1c;
      background:
        radial-gradient(circle at top left, rgba(198, 167, 94, 0.14), transparent 24%),
        linear-gradient(180deg, #fbf7ef 0%, #f2ebde 100%);
      overflow-x: clip;
    }
    #product-page-root {
      width: 100%;
      padding-top: calc(var(--announce-height, 44px) + var(--header-height, 90px));
    }
    @media (max-width: 1024px) {
      #product-page-root {
        padding-top: calc(var(--announce-height, 44px) + var(--header-height-mobile, 70px));
      }
    }
  </style>
</head>
<body>
  <div id="sierra-header-root"></div>
  <main id="product-page-root">
    <div id="product-page-content"></div>
  </main>
  <div id="sierra-footer-root"></div>

  <script type="module">
    const ASSET_VERSION = '20260524-5';
    window.SMART_CUT_ASSET_VERSION = ASSET_VERSION;
    await import(`./firebase-init.js?v=${ASSET_VERSION}`);

    const params = new URLSearchParams(window.location.search);
    const productId = params.get('product') || '';

    const mount = async (rootId, loader, options = {}) => {
      const root = document.getElementById(rootId);
      if (!root) return;
      try {
        const mod = await loader();
        new mod.default(rootId, options);
      } catch (error) {
        console.error(`Erreur composant ${rootId}:`, error);
      }
    };

    mount('sierra-header-root', () => import(`./header.js?v=${ASSET_VERSION}`));
    mount('sierra-footer-root', () => import(`./footer.js?v=${ASSET_VERSION}`), {
      imageBasePath: './',
      showSocial: true,
      showContact: true,
      showInfos: true,
      showPayments: true,
      showCopyright: true
    });

    if (!productId) {
      window.location.replace('./catalogue.html');
    } else {
      mount('product-page-content', () => import(`./product-page.js?v=${ASSET_VERSION}`), {
        productId,
        collectionName: 'products',
        imageBasePath: './'
      });
    }
  </script>
<script src="/pwa-install.js" defer></script>
</body>
</html>
