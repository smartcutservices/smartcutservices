<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Cut Services | Retour MonCash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f1e8;
      --card: #ffffff;
      --ink: #1f1e1c;
      --muted: #746b60;
      --accent: #c6a75e;
      --border: rgba(198, 167, 94, 0.22);
      --success: #1f7a45;
      --danger: #9b1c1c;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background:
        radial-gradient(circle at top left, rgba(198, 167, 94, 0.18), transparent 32%),
        var(--bg);
      color: var(--ink);
      font-family: 'Manrope', sans-serif;
    }

    .card {
      width: min(100%, 720px);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 2rem;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.08);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.55rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--accent);
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 800;
    }

    h1 {
      margin: 1rem 0 0.75rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      line-height: 0.95;
    }

    p {
      margin: 0 0 1rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .status-box {
      margin-top: 1.5rem;
      padding: 1.2rem 1.25rem;
      border-radius: 20px;
      background: #fff;
      border: 1px solid var(--border);
    }

    .status-box strong {
      display: block;
      margin-bottom: 0.35rem;
    }

    .status-paid strong { color: var(--success); }
    .status-failed strong { color: var(--danger); }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.95rem 1.2rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 800;
      border: 1px solid var(--border);
    }

    .btn-primary {
      background: var(--ink);
      color: var(--bg);
    }

    .btn-secondary {
      background: #fff;
      color: var(--ink);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">MonCash</div>
    <h1 id="page-title">Vérification du paiement</h1>
    <p id="page-copy">Nous vérifions l’état réel de votre transaction MonCash.</p>

    <section id="status-box" class="status-box">
      <strong>Chargement…</strong>
      <span id="status-detail">Merci de patienter quelques secondes.</span>
    </section>

    <div class="actions">
      <a class="btn btn-primary" href="/">Retour à l’accueil</a>
      <a class="btn btn-secondary" href="/catalogue.html">Continuer vos achats</a>
    </div>
  </main>

  <script type="module" src="./moncash-return.js"></script>
</body>
</html>
