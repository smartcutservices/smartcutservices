<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Cut Services | Confirmation MonCash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f1e8;
      --card: rgba(255, 255, 255, 0.94);
      --ink: #1f1e1c;
      --muted: #746b60;
      --accent: #c6a75e;
      --accent-strong: #a88a43;
      --border: rgba(198, 167, 94, 0.24);
      --success: #1f7a45;
      --danger: #9b1c1c;
      --pending: #8a6b1f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background:
        radial-gradient(circle at top left, rgba(198, 167, 94, 0.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(31, 30, 28, 0.1), transparent 34%),
        var(--bg);
      color: var(--ink);
      font-family: 'Manrope', sans-serif;
    }

    .card {
      width: min(100%, 760px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 2rem;
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(12px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.55rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--accent-strong);
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 800;
    }

    h1 {
      margin: 1rem 0 0.75rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      line-height: 0.95;
    }

    p {
      margin: 0 0 1rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .status-box {
      margin-top: 1.5rem;
      padding: 1.2rem 1.25rem;
      border-radius: 22px;
      background: #fff;
      border: 1px solid var(--border);
    }

    .status-box strong {
      display: block;
      margin-bottom: 0.35rem;
      font-size: 1.05rem;
    }

    .status-paid strong { color: var(--success); }
    .status-failed strong { color: var(--danger); }
    .status-pending strong { color: var(--pending); }

    .meta {
      display: none;
      gap: 0.55rem;
      margin-top: 1rem;
    }

    .meta-line {
      padding: 0.75rem 0.9rem;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(245, 241, 232, 0.72);
      color: var(--ink);
      font-size: 0.94rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.95rem 1.2rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 800;
      border: 1px solid var(--border);
      cursor: pointer;
      font: inherit;
    }

    .btn-primary {
      background: var(--ink);
      color: var(--bg);
    }

    .btn-secondary {
      background: #fff;
      color: var(--ink);
    }

    @media (max-width: 640px) {
      .card {
        padding: 1.35rem;
        border-radius: 24px;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">MonCash</div>
    <h1 id="page-title">Confirmation du paiement</h1>
    <p id="page-copy">Nous finalisons la verification de votre transaction et la mise a jour de votre commande.</p>

    <section id="status-box" class="status-box status-pending">
      <strong>Chargement...</strong>
      <span id="status-detail">Merci de patienter quelques secondes.</span>
      <div id="order-meta" class="meta"></div>
    </section>

    <div class="actions">
      <button id="refresh-status-btn" class="btn btn-primary" type="button">Verifier le statut</button>
      <a class="btn btn-secondary" href="/">Retour a l accueil</a>
      <a class="btn btn-secondary" href="/catalogue.html">Continuer vos achats</a>
    </div>
  </main>

  <script type="module" src="./moncash-return.js"></script>
</body>
</html>
